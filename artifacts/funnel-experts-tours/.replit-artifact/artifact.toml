kind = "web"
previewPath = "/"
title = "Funnel Experts Tours UAE"
version = "1.0.0"
id = "artifacts/funnel-experts-tours"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26252

[services.development]
run = "pnpm --filter @workspace/funnel-experts-tours run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/funnel-experts-tours", "run", "build" ]
publicDir = "artifacts/funnel-experts-tours/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26252"
BASE_PATH = "/"
